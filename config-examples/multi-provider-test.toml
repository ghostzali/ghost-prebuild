# Multi-provider integration test configuration
# 
# Copy this to ~/.ghost/config.toml and set the env vars to test.
#
#   export DEEPSEEK_API_KEY="sk-..."
#   export ZAI_API_KEY="..."
#   ghost providers
#   ghost models --provider deepseek
#   ghost models --provider zai
#   ghost -m gpt-5.6-sol --provider zai -p "Hello"

default_provider = "deepseek"

[[providers]]
name = "deepseek"
api_base = "https://api.deepseek.com/v1"
env_key = "DEEPSEEK_API_KEY"
auth_mode = "api_key"
models = ["deepseek-chat", "deepseek-reasoner"]

[[providers]]
name = "zai"
api_base = "https://api.z.ai/v1"
env_key = "ZAI_API_KEY"
auth_mode = "api_key"
models = ["gpt-5.6-sol", "gpt-5.6-luna", "gpt-4.1"]
