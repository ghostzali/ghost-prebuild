name: Release — Build Binary

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Build Release Binary
    runs-on: self-hosted
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Pin Rust toolchain
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup default stable 2>/dev/null || true
          rustc --version
          cargo --version

      - name: Install build prerequisites
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install dotslash --version 0.5.7
          if ! which protoc >/dev/null 2>&1; then
            echo "::warning::protoc not found"
          fi

      - name: Cache cargo + target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Fast check (fail early)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo check --all-targets \
            -p xai-grok-config-types \
            -p xai-grok-auth \
            -p xai-grok-config \
            -p xai-grok-pager \
            -p xai-grok-shell

      - name: Build release binary
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo build --release --bin xai-grok-pager 2>&1 | tee /tmp/release-build.log
          strip target/release/xai-grok-pager || true
          ln -sf xai-grok-pager target/release/g0s
          ls -lh target/release/xai-grok-pager target/release/g0s

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/xai-grok-pager
            target/release/g0s
          name: ghost-agent ${{ github.ref_name }}
          body: |
            ## ghost-agent ${{ github.ref_name }}

            Binary name: `g0s` (alias for `ghost-agent`)

            ### Install
            ```bash
            curl -L -o g0s https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/g0s
            chmod +x g0s
            ./g0s --help
            ```

            ### Provider setup
            ```bash
            mkdir -p ~/.ghost
            cat > ~/.ghost/config.toml << EOF
            [providers]
            providers = [
              { name = "openai", api_base = "https://api.openai.com/v1", env_key = "OPENAI_API_KEY" },
              { name = "deepseek", api_base = "https://api.deepseek.com/v1", env_key = "DEEPSEEK_API_KEY" }
            ]
            EOF
            g0s providers
            ```
          draft: true
          generate_release_notes: true
