name: CI — PR Build & Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-and-test:
    name: Check + Test (self-hosted)
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup default stable 2>/dev/null || true
          rustup show
          cargo --version
          rustc --version

      - name: Install build prerequisites
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install dotslash --version 0.5.7
          if ! which protoc >/dev/null 2>&1; then
            echo "::warning::protoc not found — install protobuf-compiler on the runner"
          fi

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/debug/.fingerprint
            target/debug/build
            target/debug/deps
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build check (all targets)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo check --all-targets \
            -p xai-grok-config-types \
            -p xai-grok-auth \
            -p xai-grok-config \
            -p xai-grok-models

      - name: Build check (pager + shell)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo check \
            -p xai-grok-shell \
            -p xai-grok-pager \
            -p xai-grok-pager-bin

      - name: Test
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo test \
            -p xai-grok-config-types \
            -p xai-grok-auth \
            -p xai-grok-config

      - name: Clippy
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo clippy --all-targets \
            -p xai-grok-config-types \
            -p xai-grok-auth \
            -p xai-grok-config \
            -- -D warnings
